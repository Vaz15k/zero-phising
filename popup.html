<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zero Phishing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid #1e293b;
    }

    header .logo { font-size: 24px; }
    header h1 { font-size: 16px; font-weight: 700; }
    header p { font-size: 11px; color: #64748b; }

    .status-card {
      margin: 16px;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-safe    { background: #052e16; border: 1px solid #16a34a; }
    .status-danger  { background: #450a0a; border: 1px solid #dc2626; }
    .status-loading { background: #1e293b; border: 1px solid #334155; }
    .status-skipped { background: #1e293b; border: 1px solid #334155; }

    .status-icon { font-size: 28px; }

    .status-text h2 { font-size: 14px; font-weight: 700; }
    .status-text p  { font-size: 12px; color: #94a3b8; margin-top: 2px; word-break: break-all; }

    .details {
      margin: 0 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .api-row {
      background: #1e293b;
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .api-name { font-size: 13px; font-weight: 600; }
    .api-sub  { font-size: 11px; color: #64748b; margin-top: 2px; }

    .badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 99px;
    }

    .badge-safe    { background: #16a34a22; color: #4ade80; border: 1px solid #16a34a; }
    .badge-danger  { background: #dc262622; color: #f87171; border: 1px solid #dc2626; }
    .badge-error   { background: #92400e22; color: #fbbf24; border: 1px solid #92400e; }
    .badge-loading { background: #33415522; color: #94a3b8; border: 1px solid #334155; }

    .vt-link {
      display: block;
      margin: 0 16px 16px;
      background: #1e293b;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #60a5fa;
      text-decoration: none;
      text-align: center;
    }

    .vt-link:hover { background: #273548; }

    .check-btn {
      display: block;
      width: calc(100% - 32px);
      margin: 0 16px 16px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .check-btn:hover { background: #2563eb; }

    footer {
      padding: 10px 16px;
      font-size: 11px;
      color: #475569;
      border-top: 1px solid #1e293b;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🛡️</div>
  <div>
    <h1>Zero Phishing</h1>
    <p>Proteção contra URLs maliciosas</p>
  </div>
</header>

<div id="status-card" class="status-card status-loading">
  <div class="status-icon">⏳</div>
  <div class="status-text">
    <h2>Verificando...</h2>
    <p id="current-url">Obtendo URL atual</p>
  </div>
</div>

<div id="details" class="details" style="display:none">
  <div class="api-row">
    <div>
      <div class="api-name">Google Safe Browsing</div>
      <div class="api-sub" id="gsb-sub">—</div>
    </div>
    <span id="gsb-badge" class="badge badge-loading">—</span>
  </div>

  <div class="api-row">
    <div>
      <div class="api-name">VirusTotal</div>
      <div class="api-sub" id="vt-sub">—</div>
    </div>
    <span id="vt-badge" class="badge badge-loading">—</span>
  </div>
</div>

<a id="vt-link" class="vt-link" href="#" target="_blank" style="display:none">
  🔗 Ver relatório completo no VirusTotal
</a>

<button id="recheck-btn" class="check-btn" style="display:none">
  🔄 Verificar novamente
</button>

<footer>Zero Phishing · IFMT-CBA</footer>

<script src="popup.js"></script>
</body>
</html>
